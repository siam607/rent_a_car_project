<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 80">
  <!-- Islami Bank Bangladesh (IBBL) - Official green -->
  <defs>
    <linearGradient id="islamiGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2E7D32;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1B5E20;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="200" height="80" rx="6" fill="url(#islamiGrad)"/>
  <text x="100" y="35" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white" text-anchor="middle" dominant-baseline="middle"> Islami Bank</text>
  <text x="100" y="55" font-family="Arial, sans-serif" font-size="10" fill="white" text-anchor="middle" dominant-baseline="middle">Bangladesh</text>
</svg>