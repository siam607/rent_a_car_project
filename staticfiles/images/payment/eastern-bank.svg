<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 80">
  <!-- Eastern Bank Limited (EBL) - Official green/blue -->
  <defs>
    <linearGradient id="eblGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00A651;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#007A33;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="200" height="80" rx="6" fill="url(#eblGrad)"/>
  <text x="100" y="45" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white" text-anchor="middle" dominant-baseline="middle">Eastern Bank</text>
</svg>