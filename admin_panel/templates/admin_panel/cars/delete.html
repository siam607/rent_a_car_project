{% extends 'admin_panel/base.html' %}
{% load static %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-6">
        <div class="card border-0 shadow-sm">
            <div class="card-header bg-white py-3">
                <h5 class="mb-0 text-danger">
                    <i class="bi bi-exclamation-triangle me-2"></i>Delete Car
                </h5>
            </div>
            <div class="card-body text-center">
                <i class="bi bi-car-front text-muted display-1 mb-4"></i>
                <h4>{{ car.name }}</h4>
                <p class="text-muted">Category: {{ car.get_category_display }}</p>
                
                <div class="alert alert-warning mt-4">
                    <i class="bi bi-exclamation-circle me-2"></i>
                    <strong>Warning:</strong> This action cannot be undone. All bookings and data associated with this car will be permanently deleted.
                </div>
                
                <form method="post" class="mt-4">
                    {% csrf_token %}
                    <div class="d-flex gap-2 justify-content-center">
                        <a href="{% url 'admin_panel:car_list' %}" class="btn btn-secondary">Cancel</a>
                        <button type="submit" class="btn btn-danger">
                            <i class="bi bi-trash me-2"></i>Delete Car
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
